# Pre-commit hooks for pysocialhome-client.
#
# Install:   pip install pre-commit && pre-commit install
# Run once:  pre-commit run --all-files
#
# ruff + mypy run repo-wide so local hooks match CI scope.

default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        name: ruff (lint, repo-wide)
        args: ["--fix", "."]
        always_run: true
        pass_filenames: false
      - id: ruff-format
        name: ruff (format, repo-wide)
        args: ["."]
        always_run: true
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (pysocialhome_client, repo-wide)
        args: ["--config-file=pyproject.toml", "pysocialhome_client/"]
        always_run: true
        pass_filenames: false
