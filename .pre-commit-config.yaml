# Pre-commit hooks for socialhome-client.
#
# Install:   pip install pre-commit && pre-commit install
# Run once:  pre-commit run --all-files
#
# ruff + mypy run repo-wide so local hooks match CI scope.

# No ``default_language_version`` — pre-commit picks whichever
# Python 3.13+ interpreter is on PATH. CI pins 3.13 explicitly via
# actions/setup-python; local developers can run on 3.13 or 3.14.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        name: ruff (lint, repo-wide)
        args: ["--fix", "."]
        always_run: true
        pass_filenames: false
      - id: ruff-format
        name: ruff (format, repo-wide)
        args: ["."]
        always_run: true
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (socialhome_client, repo-wide)
        additional_dependencies:
          - "aiohttp>=3.9"
        args: ["--config-file=pyproject.toml", "socialhome_client/"]
        always_run: true
        pass_filenames: false
