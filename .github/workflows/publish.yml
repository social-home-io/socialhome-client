name: Publish to PyPI

on:
  # Publishing is driven by GitHub Releases only — cutting a release
  # also creates the underlying CalVer tag (e.g. ``2026.4.22``) and
  # fires ``release.published`` exactly once. A standalone tag push
  # used to trigger a second redundant run on the same commit, so
  # the ``push.tags`` trigger was dropped.
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # OIDC — trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs needs the tag's full history to resolve the
          # version — shallow clones produce ``0.0.1.dev0+…``.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/socialhome-client
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
